<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini | Hub</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("/uv/sw.js", {
                scope: __uv$config.prefix,
            });
        });
    }
    </script>

    <style>
        :root {
            --accent: #ffffff;
            --panel-bg: rgba(10, 10, 15, 0.5); 
            --bg-base: #050507; 
            --bg-glow: #11111d; 
            --sidebar-width: 280px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-base);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden; color: white;
        }

        /* --- BACKGROUND --- */
        #grid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .bg-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-base) 100%); }

        /* --- SIDEBAR ICONS (SVG) --- */
        .icon-box { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-box svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* --- SIDEBAR UI --- */
        #menuBtn { position: fixed; top: 25px; left: 25px; font-size: 30px; cursor: pointer; z-index: 3000; }
        .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100%; background: rgba(8, 8, 10, 0.98); backdrop-filter: blur(40px); border-right: 1px solid rgba(255,255,255,0.05); z-index: 2500; display: flex; flex-direction: column; padding: 60px 30px; box-sizing: border-box; transform: translateX(-100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .sidebar.active { transform: translateX(0); }
        .sidebar label { font-size: 11px; letter-spacing: 2.5px; opacity: 0.4; margin: 30px 0 20px 0; text-transform: uppercase; font-weight: 700; }
        .sidebar a { color: white; text-decoration: none; font-size: 16px; font-weight: 500; margin-bottom: 25px; opacity: 0.7; transition: 0.2s; display: flex; align-items: center; gap: 18px; cursor: pointer; }
        .sidebar a:hover { opacity: 1; transform: translateX(5px); }
        .separator { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }

        /* --- HUB CONTENT --- */
        .logo { font-size: 12vh; font-weight: 900; margin-bottom: 10px; letter-spacing: -6px; pointer-events: none; }
        .search-wrapper { display: flex; width: 60vw; height: 8vh; background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; z-index: 10; }
        #urlInput { flex: 1; background: transparent; border: none; outline: none; color: white; padding: 0 30px; font-size: 2.2vh; }
        #searchButton { width: 8vw; background: white; color: black; border: none; font-weight: 900; cursor: pointer; border-radius: 0 11px 11px 0; }
        .quick-links { display: flex; gap: 40px; z-index: 10; }
        .quick-btn { width: 42px; height: 42px; cursor: pointer; transition: 0.3s; }
        .quick-btn img { width: 100%; height: 100%; object-fit: contain; }

        /* --- OVERLAYS --- */
        #customOverlay { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.85); z-index:5000; flex-direction:column; align-items:center; justify-content:center; opacity: 0; transition: 0.3s; }
        #customOverlay.visible { display: flex; opacity: 1; backdrop-filter: blur(25px); }
        .customize-panel { background:rgba(10,10,12,0.98); padding:50px; border-radius:25px; border: 1px solid rgba(255,255,255,0.1); width:380px; text-align:center; }
        #iframeWindow { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: none; z-index: 3500; background: white; }
        #backBtn { display: none; position: fixed; top: 25px; right: 25px; width: 55px; height: 55px; background: black; border: 1px solid white; border-radius: 50%; color: white; font-size: 24px; align-items: center; justify-content: center; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

    <div class="bg-container" id="bg-container"></div>
    <canvas id="grid-canvas"></canvas>

    <div id="menuBtn" onclick="toggleMenu()">☰</div>
    <div id="backBtn" onclick="closeBrowser()">←</div>

    <div class="sidebar" id="sidebar">
        <label>Explore</label>
        
        <a onclick="toggleMenu()"><div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div> Home</a>
        
        <a href="games.html"><div class="icon-box">
            <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h4M8 10v4M15 11v.01M18 13v.01"></path></svg>
        </div> Play</a>
        
        <a href="apps.html"><div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        </div> Apps</a>

        <a href="partners.html"><div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
        </div> Partners</a>

        <div class="separator"></div>
        <label>System</label>
        
        <a href="donators.html"><div class="icon-box">
            <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>
        </div> Donators</a>
        
        <a onclick="openCustomize()"><div class="icon-box">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </div> Settings</a>
    </div>

    <div class="logo">GEMINI</div>

    <div class="search-wrapper">
        <input type="text" id="urlInput" placeholder="Enter URL or Search...">
        <button id="searchButton" onclick="launch()">GO</button>
    </div>

    <div class="quick-links">
        <div class="quick-btn" onclick="quickLaunch('https://google.com')"><img src="public/google.ico"></div>
        <div class="quick-btn" onclick="quickLaunch('https://youtube.com')"><img src="public/youtube.ico"></div>
        <div class="quick-btn" onclick="quickLaunch('https://discord.com')"><img src="public/discord.ico"></div>
        <div class="quick-btn" onclick="quickLaunch('https://crazygames.com')"><img src="public/crazygames.ico"></div>
    </div>

    <div id="customOverlay">
        <div class="customize-panel">
            <h2>THEMES</h2>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:40px;">
                <button class="theme-btn" onclick="setTheme('#11111d', '#050507')" style="background:radial-gradient(circle, #11111d, #050507); height:50px; border-radius:10px; cursor:pointer; border:none;"></button>
                <button class="theme-btn" onclick="setTheme('#0a2b0a', '#020a02')" style="background:radial-gradient(circle, #0a2b0a, #020a02); height:50px; border-radius:10px; cursor:pointer; border:none;"></button>
                <button class="theme-btn" onclick="setTheme('#2b0a0a', '#0a0202')" style="background:radial-gradient(circle, #2b0a0a, #0a0202); height:50px; border-radius:10px; cursor:pointer; border:none;"></button>
            </div>
            <input type="text" id="bgUrlInput" placeholder="PASTE IMAGE URL..." style="width:100%; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1); border-radius:10px; margin-bottom:15px; box-sizing: border-box;">
            <button onclick="saveBgUrl()" style="width:100%; padding:15px; background:white; color:black; border-radius:10px; font-weight:900; border:none; cursor:pointer;">APPLY</button>
            <button onclick="closeCustomize()" style="margin-top:20px; padding:10px 40px; background:transparent; color:white; border:1px solid white; border-radius:30px; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <iframe id="iframeWindow"></iframe>

    <script>
        // GRID WEB SCRIPT
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let mouse = { x: -1000, y: -1000 };

        class Node {
            constructor() {
                this.baseX = Math.random() * canvas.width;
                this.baseY = Math.random() * canvas.height;
                this.x = this.baseX; this.y = this.baseY;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.baseX += this.vx; this.baseY += this.vy;
                if (this.baseX < 0) this.baseX = canvas.width;
                if (this.baseX > canvas.width) this.baseX = 0;
                if (this.baseY < 0) this.baseY = canvas.height;
                if (this.baseY > canvas.height) this.baseY = 0;

                let dx = mouse.x - this.baseX;
                let dy = mouse.y - this.baseY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 400) {
                    let pull = Math.pow((400 - dist) / 400, 2);
                    this.x = this.baseX + dx * pull * 0.9;
                    this.y = this.baseY + dy * pull * 0.9;
                } else { this.x = this.baseX; this.y = this.baseY; }
            }
        }

        function initGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            nodes = [];
            for(let i=0; i<300; i++) nodes.push(new Node());
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<nodes.length; i++) {
                nodes[i].update();
                for(let j=i+1; j<nodes.length; j++) {
                    let dist = Math.sqrt(Math.pow(nodes[i].x-nodes[j].x, 2) + Math.pow(nodes[i].y-nodes[j].y, 2));
                    if(dist < 220) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${(1-(dist/220))*0.15})`;
                        ctx.lineWidth = 0.6;
                        ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawGrid);
        }

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('resize', initGrid);
        initGrid(); drawGrid();

        // UI SCRIPT
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function openCustomize() { 
            const overlay = document.getElementById('customOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('visible'), 10);
            toggleMenu(); 
        }
        function closeCustomize() { 
            const overlay = document.getElementById('customOverlay');
            overlay.classList.remove('visible');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        function applySettings() {
            const glow = localStorage.getItem('gemini-bg-glow') || '#11111d';
            const base = localStorage.getItem('gemini-bg-base') || '#050507';
            const bgUrl = localStorage.getItem('gemini-bg-url');
            document.documentElement.style.setProperty('--bg-glow', glow);
            document.documentElement.style.setProperty('--bg-base', base);
            if (bgUrl) {
                document.getElementById('bg-container').style.backgroundImage = `url(${bgUrl})`;
                document.getElementById('bg-container').style.backgroundSize = 'cover';
                document.getElementById('grid-canvas').style.display = 'none';
            } else {
                document.getElementById('bg-container').style.backgroundImage = 'none';
                document.getElementById('grid-canvas').style.display = 'block';
            }
        }

        function setTheme(g, b) { localStorage.setItem('gemini-bg-glow', g); localStorage.setItem('gemini-bg-base', b); applySettings(); }
        function saveBgUrl() { const url = document.getElementById('bgUrlInput').value.trim(); if(url) { localStorage.setItem('gemini-bg-url', url); applySettings(); } }
        
        function launch() {
            let val = document.getElementById('urlInput').value.trim();
            if(val) {
                if (!val.includes(".") || val.includes(" ")) val = "https://lite.duckduckgo.com/lite/?q=" + encodeURIComponent(val);
                else if (!val.startsWith("http")) val = "https://" + val;
                openBrowser(val);
            }
        }
        function quickLaunch(url) { openBrowser(url); }
        function openBrowser(url) {
            document.getElementById('iframeWindow').style.display = "block";
            document.getElementById('backBtn').style.display = "flex";
            document.getElementById('menuBtn').style.display = "none";
            document.getElementById('iframeWindow').src = __uv$config.prefix + __uv$config.encodeUrl(url);
        }
        function closeBrowser() {
            document.getElementById('iframeWindow').style.display = "none";
            document.getElementById('backBtn').style.display = "none";
            document.getElementById('menuBtn').style.display = "block";
            document.getElementById('iframeWindow').src = "";
        }
        document.getElementById('urlInput').onkeydown = (e) => { if(e.key === 'Enter') launch(); };
        window.onload = applySettings;
    </script>
</body>
</html>
