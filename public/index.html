<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini | Hub</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("/uv/sw.js", {
                scope: __uv$config.prefix,
            });
        });
    }
    </script>

    <style>
        :root {
            --accent: #ffffff;
            --panel-bg: rgba(10, 10, 15, 0.98);
            --sidebar-width: 280px;
        }

        body {
            margin: 0; padding: 0;
            background-color: #050507;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden; color: white;
        }

        /* --- BACKGROUND & BUBBLES --- */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; background: radial-gradient(circle at center, #11111d 0%, #050507 100%);
        }

        .bubble {
            position: absolute; bottom: -10vh; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 50%;
            animation: floatUp 7s infinite ease-in; filter: blur(2px); opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            15% { opacity: 0.6; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-125vh) scale(0.5); opacity: 0; }
        }

        /* --- SIDEBAR --- */
        #menuBtn { position: fixed; top: 25px; left: 25px; font-size: 30px; cursor: pointer; z-index: 3000; }
        .sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width); height: 100%; background: var(--panel-bg);
            backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1);
            z-index: 2500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 100px 30px; box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            color: white; text-decoration: none; font-size: 20px; margin-bottom: 25px;
            opacity: 0.7; transition: 0.3s; display: flex; align-items: center; gap: 15px;
        }
        .sidebar a:hover { opacity: 1; transform: translateX(10px); color: var(--accent); }

        /* --- UI ELEMENTS --- */
        .trapezoid-header {
            position: absolute; top: 0; width: 650px; height: 105px; background: var(--panel-bg);
            clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        #clock { font-size: 4.5vh; font-weight: 800; }
        #date { font-size: 1.4vh; opacity: 0.4; letter-spacing: 5px; }
        .logo { font-size: 11vh; font-weight: 900; margin-bottom: 25px; letter-spacing: -5px; color: var(--accent); }

        .search-wrapper {
            display: flex; width: 55vw; height: 8vh; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(25px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        #urlInput { flex: 1; background: transparent; border: none; outline: none; color: white; padding: 0 30px; font-size: 2.5vh; }
        #searchButton { width: 10vw; background: var(--accent); color: black; border: none; font-weight: 900; cursor: pointer; border-radius: 0 14px 14px 0; }

        .quick-links { display: flex; gap: 20px; margin-top: 35px; }
        .quick-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .quick-btn:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* --- OVERLAYS --- */
        #backBtn { display: none; position: fixed; top: 25px; right: 25px; width: 50px; height: 50px; background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: white; font-size: 24px; align-items: center; justify-content: center; cursor: pointer; z-index: 4000; }
        #iframeWindow { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: none; z-index: 3500; background: white; }
        
        #customOverlay { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.9); backdrop-filter:blur(20px); z-index:5000; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div class="bg-container" id="bg-container"></div>
    <div id="menuBtn" onclick="toggleMenu()">☰</div>
    <div id="backBtn" onclick="closeBrowser()">←</div>

    <div class="sidebar" id="sidebar">
        <a href="games.html"><span>🎮</span> Games</a>
        <a href="partners.html"><span>🤝</span> Partners</a>
        <a href="#" onclick="openCustomize()"><span>🎨</span> Customize</a>
        <a href="#" onclick="toggleMenu()"><span>🏠</span> Home</a>
    </div>

    <div class="trapezoid-header">
        <div id="clock">00:00:00</div>
        <div id="date">LOADING...</div>
    </div>

    <div class="logo">GEMINI</div>

    <div class="search-wrapper">
        <input type="text" id="urlInput" placeholder="Explore...">
        <button id="searchButton" onclick="launch()">Explore</button>
    </div>

    <div class="quick-links">
        <div class="quick-btn" onclick="quickLaunch('https://google.com')"><img src="https://www.google.com/favicon.ico" width="24"></div>
        <div class="quick-btn" onclick="quickLaunch('https://youtube.com')"><img src="https://www.youtube.com/favicon.ico" width="24"></div>
        <div class="quick-btn" onclick="quickLaunch('https://discord.com')"><img src="https://discord.com/favicon.ico" width="24"></div>
    </div>

    <div id="customOverlay">
        <div style="background:var(--panel-bg); padding:40px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); width:350px; text-align:center;">
            <h2 style="margin-top:0;">Color Theme</h2>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:30px;">
                <button onclick="setTheme('#ffffff')" style="background:#fff; height:40px; border-radius:10px; cursor:pointer; border:none;"></button>
                <button onclick="setTheme('#3498db')" style="background:#3498db; height:40px; border-radius:10px; cursor:pointer; border:none;"></button>
                <button onclick="setTheme('#e74c3c')" style="background:#e74c3c; height:40px; border-radius:10px; cursor:pointer; border:none;"></button>
                <button onclick="setTheme('#2ecc71')" style="background:#2ecc71; height:40px; border-radius:10px; cursor:pointer; border:none;"></button>
                <button onclick="setTheme('#f368e0')" style="background:#f368e0; height:40px; border-radius:10px; cursor:pointer; border:none;"></button>
                <button onclick="setTheme('#9b59b6')" style="background:#9b59b6; height:40px; border-radius:10px; cursor:pointer; border:none;"></button>
            </div>
            <h2>Background</h2>
            <input type="file" id="bgUpload" accept="image/*" style="display:none;" onchange="uploadBg(event)">
            <button onclick="document.getElementById('bgUpload').click()" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:10px; cursor:pointer; margin-bottom:10px;">Upload Image</button>
            <button onclick="clearBg()" style="width:100%; padding:10px; background:transparent; color:rgba(255,255,255,0.4); border:none; cursor:pointer;">Reset to Bubbles</button>
            <button onclick="closeCustomize()" style="margin-top:20px; padding:10px 30px; background:white; color:black; border-radius:20px; font-weight:900; border:none; cursor:pointer;">Close</button>
        </div>
    </div>

    <iframe id="iframeWindow"></iframe>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function openCustomize() { document.getElementById('customOverlay').style.display = 'flex'; toggleMenu(); }
        function closeCustomize() { document.getElementById('customOverlay').style.display = 'none'; }

        // --- SETTINGS STORAGE ---
        function applySettings() {
            const theme = localStorage.getItem('gemini-theme') || '#ffffff';
            const bg = localStorage.getItem('gemini-bg');
            document.documentElement.style.setProperty('--accent', theme);
            document.getElementById('searchButton').style.background = theme;
            
            const container = document.getElementById('bg-container');
            if (bg) {
                container.style.backgroundImage = `url(${bg})`;
                container.style.backgroundSize = 'cover';
                Array.from(document.getElementsByClassName('bubble')).forEach(b => b.style.display = 'none');
            } else {
                container.style.backgroundImage = 'none';
                Array.from(document.getElementsByClassName('bubble')).forEach(b => b.style.display = 'block');
            }
        }

        function setTheme(color) { localStorage.setItem('gemini-theme', color); applySettings(); }
        function uploadBg(e) {
            const reader = new FileReader();
            reader.onload = () => { localStorage.setItem('gemini-bg', reader.result); applySettings(); };
            reader.readAsDataURL(e.target.files[0]);
        }
        function clearBg() { localStorage.removeItem('gemini-bg'); applySettings(); }

        // Bubbles Generator
        const container = document.getElementById('bg-container');
        for (let i = 0; i < 25; i++) {
            const b = document.createElement('div'); b.className = 'bubble';
            const s = (2 + Math.random() * 6) + "vh"; b.style.width = s; b.style.height = s;
            b.style.left = Math.random() * 100 + "vw"; b.style.animationDelay = (Math.random() * 3) + "s";
            container.appendChild(b);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        function launch() {
            const val = document.getElementById('urlInput').value.trim();
            if(val) {
                let url = val;
                if (!url.includes(".") || url.includes(" ")) url = "https://www.google.com/search?q=" + encodeURIComponent(url);
                else if (!url.startsWith("http")) url = "https://" + url;
                openBrowser(url);
            }
        }
        function quickLaunch(url) { openBrowser(url); }
        function openBrowser(url) {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('iframeWindow').style.display = "block";
            document.getElementById('backBtn').style.display = "flex";
            document.getElementById('menuBtn').style.display = "none";
            document.getElementById('iframeWindow').src = __uv$config.prefix + __uv$config.encodeUrl(url);
        }
        function closeBrowser() {
            document.getElementById('iframeWindow').style.display = "none";
            document.getElementById('backBtn').style.display = "none";
            document.getElementById('menuBtn').style.display = "block";
            document.getElementById('iframeWindow').src = "";
        }
        document.getElementById('urlInput').onkeydown = (e) => { if(e.key === 'Enter') launch(); };
        window.onload = applySettings;
    </script>
</body>
</html>
