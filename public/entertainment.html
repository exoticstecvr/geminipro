<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini | Entertainment</title>
    <style>
        :root { --accent: #ffffff; --bg-base: #050507; --sidebar-width: 280px; }
        
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-base); 
            font-family: 'Inter', sans-serif; 
            color: white; 
            overflow: hidden; 
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            height: 80px; width: 100%;
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; box-sizing: border-box; z-index: 3000;
        }

        .controls-left { display: flex; align-items: center; gap: 25px; }
        #menuBtn { font-size: 30px; cursor: pointer; z-index: 3001; }

        /* Sleek Custom Dropdown */
        .dropdown-container { position: relative; width: 140px; user-select: none; }
        .dropdown-selected {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 700;
            font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .dropdown-selected:hover { background: rgba(255, 255, 255, 0.1); }
        .dropdown-selected::after { content: '▼'; font-size: 9px; opacity: 0.5; margin-left: 10px; }

        .dropdown-options {
            position: absolute; top: calc(100% + 10px); left: 0; width: 100%;
            background: #0f0f14; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; overflow: hidden; display: none;
            flex-direction: column; z-index: 4000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-options.show { display: flex; }
        .option { padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .option:hover { background: rgba(255, 255, 255, 0.08); }
        .option.active { background: rgba(255, 255, 255, 0.1); }

        /* Main Content */
        #contentFrame { flex-grow: 1; width: 100%; border: none; background: #050507; }

        /* SIDEBAR: RESTORED TO ORIGINAL HUB CODE */
        .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100%; background: transparent; z-index: 2500; display: flex; flex-direction: column; padding: 60px 30px; box-sizing: border-box; transform: translateX(-100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .sidebar.active { transform: translateX(0); background: rgba(5, 5, 7, 0.95); backdrop-filter: blur(20px); }
        .sidebar label { font-size: 11px; letter-spacing: 2.5px; opacity: 0.4; margin: 30px 0 20px 0; text-transform: uppercase; font-weight: 700; }
        .sidebar a { color: white; text-decoration: none; font-size: 16px; font-weight: 500; margin-bottom: 25px; opacity: 0.7; transition: 0.2s; display: flex; align-items: center; gap: 18px; cursor: pointer; }
        .sidebar a:hover { opacity: 1; transform: translateX(5px); }
        
        .icon-box { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-box svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* Status Bar */
        .bottom-capsule { position: fixed; bottom: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 20px; z-index: 3000; font-size: 14px; font-weight: 700; left: 50%; transform: translateX(-50%); }
        .capsule-divider { width: 1px; height: 15px; background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="controls-left">
            <div id="menuBtn" onclick="toggleMenu()">☰</div>
            <div class="dropdown-container">
                <div class="dropdown-selected" id="selectedLabel" onclick="toggleDropdown()">Movies</div>
                <div class="dropdown-options" id="dropdownOptions">
                    <div class="option active" onclick="selectOption('Movies', 'movies.html')">Movies</div>
                    <div class="option" onclick="selectOption('TV Shows', 'shows.html')">TV Shows</div>
                </div>
            </div>
        </div>
        <div style="font-weight: 900; letter-spacing: 2px; font-size: 14px; opacity: 0.6;">GEMINI ENTERTAINMENT</div>
    </div>

    <iframe id="contentFrame" src="movies.html"></iframe>

    <!-- ORIGINAL HUB MENU + ENTERTAINMENT -->
    <div class="sidebar" id="sidebar">
        <label>Explore</label>
        <a onclick="toggleMenu()"><div class="icon-box"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div> Home</a>
        
        <!-- Entertainment Link -->
        <a href="entertainment.html"><div class="icon-box"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg></div> Entertainment</a>
        
        <a href="music.html"><div class="icon-box"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></div> Music</a>
        <a href="homework.html"><div class="icon-box"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h4M8 10v4M15 11v.01M18 13v.01"></path></svg></div> Play</a>
        
        <a href="partners.html"><div class="icon-box"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></div> Partners</a>
        <a href="donators.html"><div class="icon-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg></div> Donators</a>
        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0;"></div>
        <label>System</label>
        <a><div class="icon-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div> Settings</a>
    </div>

    <div class="bottom-capsule">
        <div id="time-display">00:00:00</div>
        <div class="capsule-divider"></div>
        <div id="battery-status">--%</div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleDropdown() { document.getElementById('dropdownOptions').classList.toggle('show'); }

        function selectOption(label, url) {
            document.getElementById('selectedLabel').innerText = label;
            document.getElementById('contentFrame').src = url;
            document.getElementById('dropdownOptions').classList.remove('show');
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.toggle('active', opt.innerText === label);
            });
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-selected')) {
                document.getElementById('dropdownOptions').classList.remove('show');
            }
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuBtn');
            if (sidebar.classList.contains('active') && !sidebar.contains(event.target) && event.target !== menuBtn) {
                toggleMenu();
            }
        }

        function updateStatus() {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (navigator.getBattery) {
                navigator.getBattery().then(batt => {
                    document.getElementById('battery-status').innerText = Math.round(batt.level * 100) + "%";
                });
            }
        }
        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
</body>
</html>
