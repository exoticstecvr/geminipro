<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini | Games</title>
    <style>
        :root { 
            --bg-base: #050507; 
            --bg-glow: #11111d; 
        }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-base); 
            font-family: 'Inter', sans-serif; 
            color: white; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; 
        }

        /* --- BACKGROUND & BUBBLES --- */
        .bg-container { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; 
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-base) 100%); 
            transition: background 0.5s ease;
        }

        .bubble { 
            position: absolute; bottom: -12vh; background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 50%; 
            animation: floatUp 7s infinite ease-in; filter: blur(2px); opacity: 0; 
        }

        @keyframes floatUp { 
            0% { transform: translateY(0) scale(1); opacity: 0; } 
            100% { transform: translateY(-125vh) scale(0.5); opacity: 0; } 
        }

        header { padding: 40px 0; text-align: center; }
        .title { font-size: 5vh; font-weight: 900; text-transform: uppercase; color: white; letter-spacing: -2px; }

        .home-btn { 
            position: fixed; top: 25px; left: 25px; width: 50px; height: 50px; 
            background: rgba(10,10,15,0.5); border: 1px solid rgba(255,255,255,0.2); 
            backdrop-filter: blur(10px); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; color: white; font-size: 22px; z-index: 100; transition: 0.3s; 
        }
        .home-btn:hover { background: white; color: black; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; width: 90%; max-width: 1200px; padding-bottom: 50px; 
        }

        .game-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; overflow: hidden; cursor: pointer; 
            transition: 0.4s; backdrop-filter: blur(10px); 
        }
        .game-card:hover { transform: translateY(-10px); border-color: white; }
        
        .card-image { width: 100%; height: 180px; background-size: cover; background-position: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .card-info { padding: 20px; }
        .card-info h3 { margin: 0; font-size: 22px; }
        .card-info p { opacity: 0.6; font-size: 14px; margin-top: 5px; }

        /* --- GAME OVERLAY --- */
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #gameFrame { width: 100%; height: 100%; border: none; }
        .close-btn { 
            position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; 
            background: rgba(255,255,255,0.1); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 10000; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="bg-container" id="bg-container"></div>
    <a href="index.html" class="home-btn">🏠</a>
    
    <header><div class="title">Games</div></header>

    <div class="grid">
        <div class="game-card" onclick="fetchAndPlay('https://cdn.jsdelivr.net/gh/exoticstecvr/Gemini-Games@main/ragdollplayground.html')">
            <div class="card-image" style="background-image: url('https://ragdollplayground.io/data/image/options/ragdoll-playground-banner.png');"></div>
            <div class="card-info">
                <h3>Ragdoll Playground</h3>
                <p>Physics-based sandbox simulation.</p>
            </div>
        </div>
        </div>

    <div id="gameOverlay">
        <div class="close-btn" onclick="closeGame()">✕</div>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        function applyGlobalSettings() {
            const glow = localStorage.getItem('gemini-bg-glow') || '#11111d';
            const base = localStorage.getItem('gemini-bg-base') || '#050507';
            const bgUrl = localStorage.getItem('gemini-bg-url');
            const bgC = document.getElementById('bg-container');
            
            if(bgC) {
                bgC.style.background = `radial-gradient(circle at center, ${glow} 0%, ${base} 100%)`;
                if (bgUrl) {
                    bgC.style.backgroundImage = `url(${bgUrl})`; 
                    bgC.style.backgroundSize = 'cover';
                    bgC.style.backgroundPosition = 'center';
                    Array.from(document.getElementsByClassName('bubble')).forEach(b => b.style.display = 'none');
                } else {
                    bgC.style.backgroundImage = 'none';
                    Array.from(document.getElementsByClassName('bubble')).forEach(b => b.style.display = 'block');
                }
            }
        }

        async function fetchAndPlay(url) {
            const overlay = document.getElementById('gameOverlay');
            const frame = document.getElementById('gameFrame');
            overlay.style.display = 'block';
            const response = await fetch(url);
            const htmlCode = await response.text();
            const frameDoc = frame.contentWindow.document;
            frameDoc.open(); frameDoc.write(htmlCode); frameDoc.close();
        }

        function closeGame() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('gameFrame').src = 'about:blank';
        }

        // Bubbles Generator
        const bgCont = document.getElementById('bg-container');
        for (let i = 0; i < 25; i++) {
            const b = document.createElement('div'); b.className = 'bubble';
            const s = (2+Math.random()*6)+"vh"; b.style.width = s; b.style.height = s;
            b.style.left = Math.random()*100+"vw"; b.style.animationDelay = (Math.random()*5)+"s";
            bgCont.appendChild(b);
        }

        window.onload = applyGlobalSettings;
    </script>
</body>
</html>
