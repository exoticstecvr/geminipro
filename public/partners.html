<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini | Partners</title>
    <style>
        :root { 
            --bg-base: #050507; 
            --bg-glow: #11111d; 
        }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-base); 
            font-family: 'Inter', sans-serif; 
            color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; 
        }

        .bg-container { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; 
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-base) 100%); 
            transition: background 0.5s ease;
        }

        .bubble { 
            position: absolute; bottom: -12vh; background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 50%; 
            animation: floatUp 7s infinite ease-in; filter: blur(2px); opacity: 0; 
        }

        @keyframes floatUp { 
            0% { transform: translateY(0) scale(1); opacity: 0; } 
            100% { transform: translateY(-125vh) scale(0.5); opacity: 0; } 
        }

        header { margin-bottom: 40px; text-align: center; }
        .title { font-size: 6vh; font-weight: 900; text-transform: uppercase; color: white; letter-spacing: -3px; }

        .home-btn { 
            position: fixed; top: 25px; left: 25px; width: 50px; height: 50px; 
            background: rgba(10,10,15,0.5); border: 1px solid rgba(255,255,255,0.2); 
            backdrop-filter: blur(10px); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; color: white; font-size: 22px; z-index: 100; transition: 0.3s; 
        }
        .home-btn:hover { background: white; color: black; }

        .partner-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; padding: 50px; 
            text-align: center; backdrop-filter: blur(20px); 
            transition: 0.4s; text-decoration: none; color: white; 
            display: flex; flex-direction: column; align-items: center; width: 400px; 
        }
        .partner-card:hover { 
            transform: translateY(-10px); 
            border-color: white; 
            box-shadow: 0 0 40px rgba(255,255,255,0.05); 
        }

        .partner-logo { width: 120px; height: 120px; margin-bottom: 30px; border-radius: 20px; }
        .partner-card h3 { font-size: 28px; margin: 0; }
        .partner-card p { opacity: 0.6; line-height: 1.6; margin: 15px 0 30px 0; }
        
        .visit-btn { 
            padding: 14px 45px; background: white; color: black; 
            border-radius: 40px; font-size: 14px; font-weight: 900; 
            text-transform: uppercase; transition: 0.3s;
        }
        .partner-card:hover .visit-btn { background: #eee; }
    </style>
</head>
<body>
    <div class="bg-container" id="bg-container"></div>
    <a href="index.html" class="home-btn">🏠</a>
    
    <header><div class="title">Partners</div></header>

    <a href="https://example.com" target="_blank" class="partner-card">
        <img src="https://images.emojiterra.com/google/android-11/512px/1f911.png" class="partner-logo">
        <h3>GamingBrothers 103</h3>
        <p>Official partner of Gemini Hub. Leading the way in gaming content and community engagement.</p>
        <div class="visit-btn">Visit Partner</div>
    </a>

    <script>
        function applyGlobalSettings() {
            const glow = localStorage.getItem('gemini-bg-glow') || '#11111d';
            const base = localStorage.getItem('gemini-bg-base') || '#050507';
            const bgUrl = localStorage.getItem('gemini-bg-url');
            const bgC = document.getElementById('bg-container');
            
            if(bgC) {
                bgC.style.background = `radial-gradient(circle at center, ${glow} 0%, ${base} 100%)`;
                if (bgUrl) {
                    bgC.style.backgroundImage = `url(${bgUrl})`; 
                    bgC.style.backgroundSize = 'cover';
                    bgC.style.backgroundPosition = 'center';
                    Array.from(document.getElementsByClassName('bubble')).forEach(b => b.style.display = 'none');
                } else {
                    bgC.style.backgroundImage = 'none';
                    Array.from(document.getElementsByClassName('bubble')).forEach(b => b.style.display = 'block');
                }
            }
        }

        // Bubbles Generator
        const bgCont = document.getElementById('bg-container');
        for (let i = 0; i < 20; i++) {
            const b = document.createElement('div'); b.className = 'bubble';
            const s = (2+Math.random()*6)+"vh"; b.style.width = s; b.style.height = s;
            b.style.left = Math.random()*100+"vw"; b.style.animationDelay = (Math.random()*4)+"s";
            bgCont.appendChild(b);
        }

        window.onload = applyGlobalSettings;
    </script>
</body>
</html>
