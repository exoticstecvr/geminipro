<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini | Hub</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("/uv/sw.js", {
                scope: __uv$config.prefix,
            });
        });
    }
    </script>

    <style>
        :root {
            --accent: #ffffff;
            --panel-bg: rgba(10, 10, 15, 0.5); 
            --bg-base: #050507; 
            --bg-glow: #11111d; 
            --sidebar-width: 280px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-base);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden; color: white;
        }

        /* --- FULL SCREEN GEOMETRIC WEB --- */
        #grid-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-base) 100%);
            transition: background 0.5s ease;
        }

        /* --- MINIMALIST LINE ICONS --- */
        .icon { width: 24px; height: 24px; border: 2px solid white; border-radius: 4px; display: inline-block; position: relative; flex-shrink: 0; }
        .icon-games { border-radius: 6px; } .icon-games::after { content: ''; position: absolute; top: 50%; left: 20%; width: 60%; height: 2px; background: white; }
        .icon-partners { border-radius: 50%; border-style: dashed; }
        .icon-donators { border: none; height: 24px; width: 12px; border-left: 2px solid white; border-right: 2px solid white; transform: skewX(-15deg); }
        .icon-customize { border-radius: 2px; background: linear-gradient(45deg, transparent 50%, white 50%); }
        .icon-home { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 20px solid white; border-top: none; background: none; }

        /* --- SIDEBAR --- */
        #menuBtn { position: fixed; top: 25px; left: 25px; font-size: 30px; cursor: pointer; z-index: 3000; transition: transform 0.2s; }
        
        .sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100%; 
            background: rgba(10, 10, 15, 0.98); backdrop-filter: blur(30px); border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 2500; display: flex; flex-direction: column; padding: 100px 30px; box-sizing: border-box;
            transform: translateX(-100%); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar.active { transform: translateX(0); }
        .sidebar a { color: white; text-decoration: none; font-size: 18px; font-weight: 500; margin-bottom: 30px; opacity: 0.6; transition: 0.3s; display: flex; align-items: center; gap: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .sidebar a:hover { opacity: 1; transform: translateX(5px); }

        /* --- SEARCH & LOGO --- */
        .logo { font-size: 12vh; font-weight: 900; margin-bottom: 10px; letter-spacing: -6px; pointer-events: none; }
        .search-wrapper {
            display: flex; width: 60vw; height: 8vh; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 40px; z-index: 10;
        }
        #urlInput { flex: 1; background: transparent; border: none; outline: none; color: white; padding: 0 30px; font-size: 2.2vh; font-family: 'Inter'; }
        #searchButton { width: 8vw; background: white; color: black; border: none; font-weight: 900; cursor: pointer; border-radius: 0 11px 11px 0; text-transform: uppercase; }

        .quick-links { display: flex; gap: 40px; z-index: 10; }
        .quick-btn { width: 42px; height: 42px; cursor: pointer; transition: 0.4s; background: none; border: none; opacity: 0.8; }
        .quick-btn:hover { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 10px white); }
        .quick-btn img { width: 100%; height: 100%; object-fit: contain; }

        /* --- CUSTOMIZATION OVERLAY --- */
        #customOverlay { 
            display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; 
            background:rgba(0,0,0,0.85); z-index:5000; flex-direction:column; align-items:center; justify-content:center; 
            transition: 0.3s; opacity: 0;
        }
        #customOverlay.visible { display: flex; opacity: 1; backdrop-filter: blur(25px); }
        .customize-panel {
            background:rgba(10,10,12,0.98); padding:50px; border-radius:25px; 
            border:1px solid rgba(255,255,255,0.1); width:380px; text-align:center;
            transform: scale(0.9); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #customOverlay.visible .customize-panel { transform: scale(1); }

        .theme-btn { height:50px; border-radius:10px; cursor:pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-btn.active { border-color: white; transform: scale(1.05); }
        
        #iframeWindow { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: none; z-index: 3500; background: white; }
        #backBtn { display: none; position: fixed; top: 25px; right: 25px; width: 55px; height: 55px; background: black; border: 1px solid white; border-radius: 50%; color: white; font-size: 24px; align-items: center; justify-content: center; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

    <div class="bg-container" id="bg-container"></div>
    <canvas id="grid-canvas"></canvas>

    <div id="menuBtn" onclick="toggleMenu()">☰</div>
    <div id="backBtn" onclick="closeBrowser()">←</div>

    <div class="sidebar" id="sidebar">
        <a href="games.html"><div class="icon icon-games"></div> Games</a>
        <a href="partners.html"><div class="icon icon-partners"></div> Partners</a>
        <a href="donators.html"><div class="icon icon-donators"></div> Donators</a>
        <a onclick="openCustomize()"><div class="icon icon-customize"></div> Customize</a>
        <a onclick="toggleMenu()"><div class="icon icon-home"></div> Home</a>
    </div>

    <div class="logo">GEMINI</div>

    <div class="search-wrapper">
        <input type="text" id="urlInput" placeholder="SEARCH OR TYPE URL">
        <button id="searchButton" onclick="launch()">GO</button>
    </div>

    <div class="quick-links">
        <div class="quick-btn" onclick="quickLaunch('https://google.com')"><img src="public/google.ico"></div>
        <div class="quick-btn" onclick="quickLaunch('https://youtube.com')"><img src="public/youtube.ico"></div>
        <div class="quick-btn" onclick="quickLaunch('https://discord.com')"><img src="public/discord.ico"></div>
        <div class="quick-btn" onclick="quickLaunch('https://crazygames.com')"><img src="public/crazygames.ico"></div>
    </div>

    <div id="customOverlay">
        <div class="customize-panel">
            <h2 style="margin-top:0; letter-spacing: 3px;">THEMES</h2>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:40px;">
                <button class="theme-btn" data-glow="#11111d" onclick="setTheme('#11111d', '#050507')" style="background:radial-gradient(circle, #11111d, #050507);"></button>
                <button class="theme-btn" data-glow="#0a2b0a" onclick="setTheme('#0a2b0a', '#020a02')" style="background:radial-gradient(circle, #0a2b0a, #020a02);"></button>
                <button class="theme-btn" data-glow="#2b0a0a" onclick="setTheme('#2b0a0a', '#0a0202')" style="background:radial-gradient(circle, #2b0a0a, #0a0202);"></button>
                <button class="theme-btn" data-glow="#0a1b2b" onclick="setTheme('#0a1b2b', '#02050a')" style="background:radial-gradient(circle, #0a1b2b, #02050a);"></button>
                <button class="theme-btn" data-glow="#1b0a2b" onclick="setTheme('#1b0a2b', '#05020a')" style="background:radial-gradient(circle, #1b0a2b, #05020a);"></button>
                <button class="theme-btn" data-glow="#0a2b27" onclick="setTheme('#0a2b27', '#020a09')" style="background:radial-gradient(circle, #0a2b27, #020a09);"></button>
            </div>
            <h2 style="letter-spacing: 3px;">CUSTOM BACKDROP</h2>
            <input type="text" id="bgUrlInput" placeholder="PASTE IMAGE URL..." style="width:100%; padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1); border-radius:10px; margin-bottom:15px;">
            <button onclick="saveBgUrl()" style="width:100%; padding:15px; background:white; color:black; border-radius:10px; font-weight:900; cursor:pointer; margin-bottom:10px; border:none;">APPLY</button>
            <button onclick="clearToDefault()" style="width:100%; padding:10px; background:transparent; color:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:10px; cursor:pointer;">RESET ALL</button>
            <button onclick="closeCustomize()" style="margin-top:30px; padding:12px 40px; background:white; color:black; border-radius:30px; font-weight:900; border:none; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <iframe id="iframeWindow"></iframe>

    <script>
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        let mouse = { x: -1000, y: -1000 };

        class Node {
            constructor() {
                this.baseX = Math.random() * canvas.width;
                this.baseY = Math.random() * canvas.height;
                this.x = this.baseX; this.y = this.baseY;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.baseX += this.vx; this.baseY += this.vy;
                if (this.baseX < 0) this.baseX = canvas.width;
                if (this.baseX > canvas.width) this.baseX = 0;
                if (this.baseY < 0) this.baseY = canvas.height;
                if (this.baseY > canvas.height) this.baseY = 0;

                let dx = mouse.x - this.baseX;
                let dy = mouse.y - this.baseY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let maxDist = 400; // Increased reach

                if (dist < maxDist) {
                    let pull = Math.pow((maxDist - dist) / maxDist, 2.5);
                    this.x = this.baseX + dx * pull * 0.9;
                    this.y = this.baseY + dy * pull * 0.9;
                } else {
                    this.x = this.baseX; this.y = this.baseY;
                }
            }
        }

        function initGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            nodes = [];
            // HIGH DENSITY: 300 nodes for total screen coverage
            for(let i=0; i<300; i++) nodes.push(new Node());
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<nodes.length; i++) {
                nodes[i].update();
                for(let j=i+1; j<nodes.length; j++) {
                    let dx = nodes[i].x - nodes[j].x;
                    let dy = nodes[i].y - nodes[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if(dist < 220) { // Increased link distance
                        let alpha = (1 - (dist / 220)) * 0.15;
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawGrid);
        }

        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('resize', initGrid);
        initGrid(); drawGrid();

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function openCustomize() { 
            const overlay = document.getElementById('customOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('visible'), 10);
            toggleMenu(); 
        }
        function closeCustomize() { 
            const overlay = document.getElementById('customOverlay');
            overlay.classList.remove('visible');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        function applySettings() {
            const glow = localStorage.getItem('gemini-bg-glow') || '#11111d';
            const base = localStorage.getItem('gemini-bg-base') || '#050507';
            const bgUrl = localStorage.getItem('gemini-bg-url');
            document.documentElement.style.setProperty('--bg-glow', glow);
            document.documentElement.style.setProperty('--bg-base', base);
            const container = document.getElementById('bg-container');
            const canvasEl = document.getElementById('grid-canvas');
            if (bgUrl) {
                container.style.backgroundImage = `url(${bgUrl})`; container.style.backgroundSize = 'cover';
                canvasEl.style.display = 'none';
            } else {
                container.style.backgroundImage = 'none'; canvasEl.style.display = 'block';
            }
        }

        function setTheme(g, b) { localStorage.setItem('gemini-bg-glow', g); localStorage.setItem('gemini-bg-base', b); applySettings(); }
        function saveBgUrl() { const url = document.getElementById('bgUrlInput').value.trim(); if(url) { localStorage.setItem('gemini-bg-url', url); applySettings(); } }
        function clearToDefault() { localStorage.removeItem('gemini-bg-url'); applySettings(); }

        function launch() {
            let val = document.getElementById('urlInput').value.trim();
            if(val) {
                if (!val.includes(".") || val.includes(" ")) val = "https://lite.duckduckgo.com/lite/?q=" + encodeURIComponent(val);
                else if (!val.startsWith("http")) val = "https://" + val;
                openBrowser(val);
            }
        }
        function quickLaunch(url) { openBrowser(url); }
        function openBrowser(url) {
            document.getElementById('iframeWindow').style.display = "block";
            document.getElementById('backBtn').style.display = "flex";
            document.getElementById('menuBtn').style.display = "none";
            document.getElementById('iframeWindow').src = __uv$config.prefix + __uv$config.encodeUrl(url);
        }
        function closeBrowser() {
            document.getElementById('iframeWindow').style.display = "none";
            document.getElementById('backBtn').style.display = "none";
            document.getElementById('menuBtn').style.display = "block";
            document.getElementById('iframeWindow').src = "";
        }
        document.getElementById('urlInput').onkeydown = (e) => { if(e.key === 'Enter') launch(); };
        window.onload = applySettings;
    </script>
</body>
</html>
